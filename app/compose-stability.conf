// Types the Compose compiler can't prove stable, but which are stable in this codebase.
//
// Read by the composeCompiler block in build.gradle.kts. Declaring a type here changes how Compose
// compares it when deciding whether to skip a recomposition: unstable parameters are compared by
// instance identity (===), stable ones by equals(). For value types that are rebuilt on every pass —
// a BigDecimal from arithmetic, a List from .map {} — identity always fails and the child recomposes
// even when nothing it can see has changed.
//
// Each entry is a promise the compiler cannot verify. Only add a type that is genuinely immutable, or
// that this codebase never mutates in place.
//
// ⚠️ Gradle does NOT treat this file as an input to compileReleaseKotlin. Editing it and rebuilding
// reports BUILD SUCCESSFUL while silently changing nothing — the compile task is simply up-to-date.
// After editing, force the recompile:
//
//     ./gradlew :app:compileReleaseKotlin -PcomposeMetrics --rerun-tasks
//
// Two "successful" builds during the original change were stale for exactly this reason. Always
// confirm against the numbers in build/compose-metrics/app_release-module.json rather than the
// build result.

// --- JDK value types. Immutable by contract; these are free wins. --------------------------------
// BigDecimal is 59 unstable composable parameters on its own as of the 10.6.2 baseline — every
// amount in the app is one.
java.math.BigDecimal

// The whole java.time package is specified as immutable, thread-safe value types, so the wildcard is
// safe and saves chasing them one at a time. LocalDate and YearMonth are the two that actually
// matter here; YearMonth in particular cascades — it was the single field keeping MonthGroup,
// ReceiptMonthGroup and therefore HistoryUiState unstable.
java.time.*

// --- Read-only collection interfaces -------------------------------------------------------------
// 62 unstable parameters between them. These are interfaces, so the compiler must assume a
// MutableList could be upcast and mutated behind Compose's back.
//
// Verified safe here before adding: no UiState field is typed as a mutable collection, and the only
// mutable collections in the whole UI layer are two locals in InsightsViewModel.highlights(), which
// escape via `out.take(3)` — a fresh read-only copy. Lists reaching composables come from Room
// queries and .map {} / .filter {}, never from a retained mutable instance.
//
// The rule this encodes: never hand a MutableList to a composable and then mutate it. Build a new
// list instead. If that ever changes, this entry becomes a lie and the symptom is stale UI that a
// recomposition should have refreshed.
kotlin.collections.List
kotlin.collections.Map
kotlin.collections.Set
