junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
lifecycleRuntimeKtx = "2.9.4"
activityCompose = "1.11.0"
composeBom = "2026.01.00"
room = "2.7.1"
koin = "3.5.6"
navigationCompose = "2.8.4"
coroutines = "1.9.0"
firebaseBom = "33.7.0"
credentials = "1.3.0"
googleid = "1.1.1"
googleServices = "4.4.2"
