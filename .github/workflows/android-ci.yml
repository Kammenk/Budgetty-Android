name: Android CI

# Runs on every branch push and every PR. No signing and no device: this gate is detekt +
# unit tests + Android Lint + a debug/release assemble. Instrumented tests, the Baseline
# Profile (needs a rooted device), and signed release bundles stay local — see RELEASE.md.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref so a rapid push sequence doesn't queue stale jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17' # AGP 8.12 requires JDK 17+

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install compileSdk 36
        # compileSdk 36 is newer than the runner's preinstalled platforms, and AGP won't
        # auto-download it. build-tools is pulled in transitively but pinned for reproducibility.
        run: yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provide a stub google-services.json
        # The real file is gitignored (it's per-developer config). Compilation and unit tests never
        # call Firebase, so a structurally-valid stub for the app's package id is enough to satisfy
        # the google-services plugin. Real Firebase in CI would come from a secret, not this.
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "budgetty-ci-stub",
              "storage_bucket": "budgetty-ci-stub.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.budgetty.app"
                  }
                },
                "oauth_client": [
                  {
                    "client_id": "000000000000-ci0stub0web0client.apps.googleusercontent.com",
                    "client_type": 3
                  }
                ],
                "api_key": [
                  { "current_key": "AIzaSyStubKeyForCiBuildsOnly0000000000000" }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: detekt
        run: ./gradlew :app:detekt --no-daemon

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Android Lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Assemble debug + release
        # Release assemble consumes the committed Baseline Profile and exercises the (minify-off)
        # release path; it builds unsigned here since keystore.properties is absent on CI.
        run: ./gradlew :app:assembleDebug :app:assembleRelease --no-daemon

      - name: Upload test & lint reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/tests/
            app/build/reports/detekt/
            app/build/reports/lint-results-*.html
          retention-days: 7
          if-no-files-found: ignore
